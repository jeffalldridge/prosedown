name: Bug
description: Something doesn't work the way the spec says it should.
title: "[Bug] "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: ProseDown version
      description: Output of `prosedown --version` (or paste the pyproject.toml version)
      placeholder: 0.6.1
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: 3.12.4
    validations:
      required: true

  - type: dropdown
    id: command
    attributes:
      label: Which command?
      options:
        - build
        - deconstruct
        - both / library use
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Include exact CLI command if relevant.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
      description: Quote the relevant section of `spec/prosedown.md` if applicable.
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: |
        A small `.md` source or `.epub` that triggers the bug. For
        copyrighted EPUBs, share a synthetic file that exhibits the same
        structure.
      render: text
    validations:
      required: false
