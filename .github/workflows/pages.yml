name: Deploy to GitHub Pages

# Publishes the static landing site under docs/site/ to GitHub Pages.
# Live URL: https://jeffalldridge.github.io/prosedown/
#
# No Jekyll, no build step — just a hand-tuned HTML + CSS pair plus
# the .nojekyll marker so Pages serves the directory raw.

on:
  push:
    branches: [main]
    paths:
      - "docs/site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site artifact
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - name: Stage site
        run: |
          mkdir -p _site
          cp -R docs/site/. _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
