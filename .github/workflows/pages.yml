name: Deploy to GitHub Pages

# Builds the static landing site under docs/site/ plus the spec page
# rendered from spec/prosedown.md, plus sitemap.xml / robots.txt /
# manifest.webmanifest, and publishes everything to GitHub Pages.
#
# Live URL: https://jeffalldridge.github.io/prosedown/

on:
  push:
    branches: [main]
    paths:
      - "docs/site/**"
      - "spec/prosedown.md"
      - "scripts/build_site.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site artifact
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install renderer dependency
        run: pip install --quiet markdown

      - name: Render spec → HTML and emit sitemap/robots/manifest
        run: python scripts/build_site.py

      - name: Stage site
        run: |
          mkdir -p _site
          cp -R docs/site/. _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
