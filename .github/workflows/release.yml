name: Release

# Triggered when you push a tag like `v0.6.1`. Builds sdist + wheel, then
# publishes to PyPI using OIDC trusted publishing — no API tokens, no
# secrets to rotate.
#
# One-time PyPI setup before the first release:
#
#   1. Create an account at https://pypi.org/account/register/
#   2. Go to https://pypi.org/manage/account/publishing/
#   3. Add a "pending publisher":
#        Project name:   prosedown
#        Owner:          jeffalldridge
#        Repository:     prosedown
#        Workflow:       release.yml
#        Environment:    pypi
#   4. Create a GitHub Environment named "pypi" with no secrets and no
#      review required (Settings → Environments → New environment).
#
# After the first successful publish, the trusted publisher is locked to
# this exact (owner, repo, workflow, environment) tuple. Push a tag and
# the workflow handles the rest.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write   # for creating the GitHub Release
  id-token: write   # for OIDC token used by PyPI trusted publishing

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      # On tag push, the tag must match the package version exactly.
      # On manual workflow_dispatch (used as a dry-run from main), skip the
      # check — the publish + release jobs are also gated on a tag below.
      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Tag version: $tag"
          echo "Package version: $pkg"
          if [[ "$tag" != "$pkg" ]]; then
            echo "::error::Tag $tag does not match pyproject.toml version $pkg"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    # Only fire on a real tag push, not a manual workflow_dispatch dry-run.
    # That way `gh workflow run release.yml` validates the build pipeline
    # without ever touching PyPI.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/prosedown

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted publishing — no token, just OIDC.

  release-github:
    name: Create GitHub Release
    # Only fire on a real tag push.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: publish-pypi
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Compute checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          name: ProseDown ${{ github.ref_name }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS.txt
